name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Public CI must not require or expose the private RuStore signing key.
      - name: Run checks and build debug APKs
        run: ./gradlew clean license check assembleDebug --no-daemon

      - name: Upload APKs
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: DocSScaner-debug-APKs-PR-${{ github.event.pull_request.number }}
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 30
